<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#818CF8" />
  <title>Sky Order Converter</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B1120;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #151E2E;
      border: 1px solid #1E293B;
      border-radius: 16px;
      padding: 32px;
    }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    p { color: #94A3B8; line-height: 1.5; }
    button {
      margin-top: 20px;
      background: linear-gradient(135deg, #6366F1, #818CF8);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Sky Order Converter</h1>
    <p>You are offline. Reconnect to the server to convert and download orders.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
